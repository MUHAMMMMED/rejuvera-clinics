version: "3.8"

services:
  db:
    image: postgres:13
    container_name: postgres_db
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: backendlanding
    depends_on:
      - db
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_backend:/app/static
      - media_backend:/app/media

  stripe:
    image: stripe/stripe-cli:v1.21.2
    container_name: stripe
    command:
      [
        "listen",
        "--forward-to",
        "http://backend:8000/api/payments/stripe_webhook",
      ]
    depends_on:
      - backend
    env_file:
      - ./.env

  frontend:
    build:
      context: ./frontend
    container_name: frontendedlanding
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/build:/usr/share/nginx/html
      - static_backend:/app/static
      - media_backend:/app/media
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_backend:
  media_backend:
